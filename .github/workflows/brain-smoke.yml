name: BEAN brain smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  brain-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install light runtime dependency
        run: python -m pip install psutil
      - name: Compile check
        run: python -m compileall -q bean bean_run.py
      - name: Boot readiness
        run: python -m bean.runtime.boot_readiness --temp
      - name: Smoke tests
        run: bash scripts/run_brain_smoke_tests.sh
